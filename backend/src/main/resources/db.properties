db.url=${DB_URL}
db.username=${DB_USERNAME}
db.password=${DB_PASSWORD}
db.driver=org.postgresql.Driver

# Apache Commons DBCP2 connection pool
db.pool.initialSize=5
db.pool.maxTotal=20
db.pool.maxIdle=10
db.pool.minIdle=5
db.pool.maxWaitMillis=10000

db.pool.validationQuery=SELECT 1
db.pool.validationQueryTimeout=3
db.pool.testOnBorrow=true
db.pool.testWhileIdle=true

db.pool.timeBetweenEvictionRunsMillis=30000
db.pool.minEvictableIdleTimeMillis=300000

# Optional leak detection / cleanup (useful for debugging)
db.pool.removeAbandonedOnBorrow=true
db.pool.removeAbandonedTimeout=60
db.pool.logAbandoned=true

# L2 JPA cache statistics logging (AOP)
cache.l2.stats.logging.enabled=false


# MinIO (S3-compatible object storage) for import files
minio.endpoint=http://127.0.0.1:18743
minio.accessKey=minioadmin
minio.secretKey=minioadmin
minio.bucket=avatars
minio.autoCreateBucket=true
